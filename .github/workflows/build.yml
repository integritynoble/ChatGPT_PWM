name: Build standalone ChatGPT-PWM binaries

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. 1.0.0)"
        required: false
        default: ""

jobs:
  build-linux-x86_64:
    name: Build (Linux x86_64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      - name: Build binary
        run: |
          pyinstaller \
            --onefile \
            --name chatgpt-pwm-linux-x86_64 \
            --hidden-import httpx \
            --hidden-import rich \
            --hidden-import click \
            --hidden-import prompt_toolkit \
            chatgpt_pwm/__main__.py

      - uses: actions/upload-artifact@v4
        with:
          name: chatgpt-pwm-linux-x86_64
          path: dist/chatgpt-pwm-linux-x86_64
          retention-days: 30

  build-linux-arm64:
    name: Build (Linux arm64)
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      - name: Build binary
        run: |
          pyinstaller \
            --onefile \
            --name chatgpt-pwm-linux-arm64 \
            --hidden-import httpx \
            --hidden-import rich \
            --hidden-import click \
            --hidden-import prompt_toolkit \
            chatgpt_pwm/__main__.py

      - uses: actions/upload-artifact@v4
        with:
          name: chatgpt-pwm-linux-arm64
          path: dist/chatgpt-pwm-linux-arm64
          retention-days: 30

  build-macos-arm64:
    name: Build (macOS arm64)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      - name: Build binary
        run: |
          pyinstaller \
            --onefile \
            --name chatgpt-pwm-macos-arm64 \
            --hidden-import httpx \
            --hidden-import rich \
            --hidden-import click \
            --hidden-import prompt_toolkit \
            chatgpt_pwm/__main__.py

      - uses: actions/upload-artifact@v4
        with:
          name: chatgpt-pwm-macos-arm64
          path: dist/chatgpt-pwm-macos-arm64
          retention-days: 30

  build-windows:
    name: Build (Windows x86_64)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      - name: Build binary
        run: |
          pyinstaller `
            --onefile `
            --name chatgpt-pwm-windows-x86_64 `
            --hidden-import httpx `
            --hidden-import rich `
            --hidden-import click `
            --hidden-import prompt_toolkit `
            chatgpt_pwm/__main__.py

      - uses: actions/upload-artifact@v4
        with:
          name: chatgpt-pwm-windows-x86_64
          path: dist/chatgpt-pwm-windows-x86_64.exe
          retention-days: 30

  release:
    name: Create GitHub Release
    needs:
      - build-linux-x86_64
      - build-linux-arm64
      - build-macos-arm64
      - build-windows
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: chatgpt-pwm-linux-x86_64
      - uses: actions/download-artifact@v4
        with:
          name: chatgpt-pwm-linux-arm64
      - uses: actions/download-artifact@v4
        with:
          name: chatgpt-pwm-macos-arm64
      - uses: actions/download-artifact@v4
        with:
          name: chatgpt-pwm-windows-x86_64

      - name: Get version
        id: ver
        run: |
          INPUT="${{ github.event.inputs.version }}"
          if [ -n "$INPUT" ]; then
            echo "version=$INPUT" >> $GITHUB_OUTPUT
          else
            echo "version=$(python -c 'from chatgpt_pwm import __version__; print(__version__)')" >> $GITHUB_OUTPUT
          fi

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.ver.outputs.version }}
          name: "ChatGPT-PWM v${{ steps.ver.outputs.version }}"
          body: |
            ## ChatGPT-PWM v${{ steps.ver.outputs.version }}

            ChatGPT CLI powered by your ChatGPT subscription — same experience as ChatGPT, authenticated with your ChatGPT account (OAuth, like Codex). No API key.

            No Python installation required — just download and run.

            ### Install (one-liner)
            ```bash
            curl -fsSL https://raw.githubusercontent.com/integritynoble/ChatGPT_PWM/main/install.sh | bash
            ```

            ### macOS (Apple Silicon)
            ```bash
            curl -L https://github.com/integritynoble/ChatGPT_PWM/releases/latest/download/chatgpt-pwm-macos-arm64 \
              -o /usr/local/bin/chatgpt-pwm && chmod +x /usr/local/bin/chatgpt-pwm
            # If Gatekeeper blocks:
            xattr -d com.apple.quarantine /usr/local/bin/chatgpt-pwm
            ```

            ### Linux (x86_64)
            ```bash
            curl -L https://github.com/integritynoble/ChatGPT_PWM/releases/latest/download/chatgpt-pwm-linux-x86_64 \
              -o /usr/local/bin/chatgpt-pwm && chmod +x /usr/local/bin/chatgpt-pwm
            ```

            ### Linux (arm64)
            ```bash
            curl -L https://github.com/integritynoble/ChatGPT_PWM/releases/latest/download/chatgpt-pwm-linux-arm64 \
              -o /usr/local/bin/chatgpt-pwm && chmod +x /usr/local/bin/chatgpt-pwm
            ```

            ### Windows (x86_64)
            Download [chatgpt-pwm-windows-x86_64.exe](https://github.com/integritynoble/ChatGPT_PWM/releases/latest/download/chatgpt-pwm-windows-x86_64.exe) and add to PATH.

            ### Sign in and chat
            ```bash
            chatgpt-pwm login   # opens your browser to sign in with ChatGPT
            chatgpt-pwm         # start chatting
            ```
          files: |
            chatgpt-pwm-linux-x86_64
            chatgpt-pwm-linux-arm64
            chatgpt-pwm-macos-arm64
            chatgpt-pwm-windows-x86_64.exe
          draft: false
          prerelease: false
