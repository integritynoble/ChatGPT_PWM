<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>ChatGPT</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Cpath fill='%23fff' d='M22.28 9.82a5.98 5.98 0 0 0-.52-4.91 6.05 6.05 0 0 0-6.51-2.9A6.07 6.07 0 0 0 4.98 4.18a5.98 5.98 0 0 0-4 2.9 6.05 6.05 0 0 0 .75 7.1 5.98 5.98 0 0 0 .51 4.91 6.05 6.05 0 0 0 6.51 2.9A5.98 5.98 0 0 0 13.26 24a6.06 6.06 0 0 0 5.77-4.21 5.99 5.99 0 0 0 4-2.9 6.06 6.06 0 0 0-.75-7.07z'/%3E%3C/svg%3E">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link id="hljs-dark" rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
<link id="hljs-light" rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css" disabled>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
<script src="https://cdn.jsdelivr.net/npm/marked@12.0.0/marked.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/dompurify@3.0.9/dist/purify.min.js"></script>
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
<script defer src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script defer src="https://cdn.jsdelivr.net/npm/mammoth@1.8.0/mammoth.browser.min.js"></script>

<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{
    --bg:#212121; --sidebar:#171717; --composer:#303030; --composer-border:rgba(255,255,255,.08);
    --user-bubble:#303030; --text:#ececec; --text-2:#b4b4b4; --text-3:#8e8e9e;
    --hover:#2f2f2f; --hover-2:#212121; --border:rgba(255,255,255,.1);
    --accent:#fff; --accent-fg:#000; --code-bg:#0d0d0d; --code-head:#2a2a2a;
    --menu:#2a2a2a; --menu-hover:#3a3a3a; --danger:#e5484d;
    --sb-w:260px; --maxw:768px;
    --font:"Söhne","Inter",ui-sans-serif,-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif,"Apple Color Emoji","Segoe UI Emoji";
    --mono:ui-monospace,"SF Mono",SFMono-Regular,Menlo,Consolas,"Liberation Mono",monospace;
  }
  :root[data-theme="light"]{
    --bg:#ffffff; --sidebar:#f9f9f9; --composer:#ffffff; --composer-border:rgba(0,0,0,.12);
    --user-bubble:#f4f4f4; --text:#0d0d0d; --text-2:#5d5d5d; --text-3:#8f8f8f;
    --hover:#ececec; --hover-2:#f0f0f0; --border:rgba(0,0,0,.1);
    --accent:#0d0d0d; --accent-fg:#fff; --code-bg:#f6f8fa; --code-head:#eaecef;
    --menu:#ffffff; --menu-hover:#f2f2f2; --danger:#d92d20;
  }
  html,body{height:100%}
  body{font-family:var(--font);background:var(--bg);color:var(--text);font-size:16px;line-height:1.5;
       -webkit-font-smoothing:antialiased;overflow:hidden;transition:background .2s,color .2s}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
  textarea,input{font-family:inherit}
  ::-webkit-scrollbar{width:8px;height:8px}
  ::-webkit-scrollbar-thumb{background:#8884;border-radius:8px}
  ::-webkit-scrollbar-thumb:hover{background:#8888}
  ::-webkit-scrollbar-track{background:transparent}

  #app{display:flex;height:100dvh;overflow:hidden}
  #sb-backdrop{display:none}

  /* ── Sidebar ───────────────────────────────────────── */
  #sidebar{width:var(--sb-w);background:var(--sidebar);display:flex;flex-direction:column;
           flex-shrink:0;transition:width .2s ease, margin-left .2s ease;overflow:hidden}
  /* desktop collapsed = narrow icon rail */
  #sidebar.collapsed{width:56px}
  #sidebar.collapsed .sb-top{flex-direction:column;align-items:center;gap:4px;padding:10px 0 4px}
  #sidebar.collapsed .sb-nav,#sidebar.collapsed #sb-search,#sidebar.collapsed #chat-list{display:none}
  #sidebar.collapsed .sb-foot{padding:8px 0}
  #sidebar.collapsed .account{justify-content:center;padding:8px;gap:0}
  #sidebar.collapsed .account .meta{display:none}
  #rail-search{display:none}
  #sidebar.collapsed #rail-search{display:flex}
  .sb-top{display:flex;align-items:center;justify-content:space-between;padding:10px 8px 4px}
  .icon-btn{width:34px;height:34px;border-radius:8px;display:flex;align-items:center;justify-content:center;
            color:var(--text);transition:background .15s}
  .icon-btn:hover{background:var(--hover)}
  .icon-btn.on{background:var(--hover);color:var(--text)}
  .temp-hero{display:flex;flex-direction:column;align-items:center;gap:8px;text-align:center}
  .temp-hero h1{font-size:24px;font-weight:600;color:var(--text)}
  .temp-hero p{font-size:14px;color:var(--text-3);max-width:400px}
  body.temp #composer{border-style:dashed}
  .sb-nav{padding:4px 8px}
  .nav-item{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:8px;font-size:14px;
            color:var(--text);transition:background .15s;width:100%;text-align:left}
  .nav-item:hover{background:var(--hover)}
  .nav-item svg{flex-shrink:0;opacity:.9}
  /* sidebar search */
  #sb-search{display:none;padding:4px 8px 2px}
  #sb-search.show{display:block}
  #sb-search-inner{display:flex;align-items:center;gap:8px;background:var(--hover);border-radius:10px;padding:8px 10px}
  #sb-search-inner svg{flex-shrink:0;color:var(--text-3)}
  #sb-search input{flex:1;background:none;border:none;outline:none;color:var(--text);font-size:14px}
  .sb-section{padding:16px 12px 6px;font-size:12px;color:var(--text-3);font-weight:600}
  #chat-list{flex:1;overflow-y:auto;padding:0 8px}
  .chat-item{position:relative;display:flex;align-items:center;padding:8px 10px;border-radius:8px;
             font-size:14px;color:var(--text);white-space:nowrap;overflow:hidden;margin-bottom:1px;
             transition:background .15s;cursor:pointer}
  .chat-item:hover{background:var(--hover)}
  .chat-item.active{background:var(--hover)}
  .chat-item .title{flex:1;overflow:hidden;text-overflow:ellipsis}
  .chat-item .title-input{flex:1;background:var(--bg);border:1px solid var(--border);border-radius:6px;
             color:var(--text);font-size:14px;padding:2px 6px;outline:none}
  .chat-item .menu-btn{opacity:0;width:26px;height:26px;border-radius:6px;display:flex;align-items:center;
                  justify-content:center;flex-shrink:0;color:var(--text-2)}
  .chat-item:hover .menu-btn{opacity:1}
  .chat-item .menu-btn:hover{background:var(--hover-2);color:var(--text)}
  .empty-list{padding:14px 14px;font-size:13px;color:var(--text-3)}
  .sb-foot{padding:8px;border-top:1px solid var(--border);margin-top:auto}
  .account{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:8px;width:100%;
           text-align:left;transition:background .15s}
  .account:hover{background:var(--hover)}
  .avatar-sm{width:28px;height:28px;border-radius:50%;background:#5d5dff;display:flex;align-items:center;
             justify-content:center;font-size:13px;font-weight:600;color:#fff;flex-shrink:0}
  .account .meta{overflow:hidden}
  .account .meta .name{font-size:14px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .account .meta .sub{font-size:12px;color:var(--text-3)}

  /* ── Main ──────────────────────────────────────────── */
  #main{flex:1;display:flex;flex-direction:column;min-width:0;position:relative}
  #topbar{display:flex;align-items:center;gap:6px;padding:10px 14px;height:52px;flex-shrink:0}
  .menu-toggle{display:none}
  #model-btn{display:flex;align-items:center;gap:6px;padding:8px 12px;border-radius:10px;font-size:18px;
             font-weight:500;color:var(--text);transition:background .15s}
  #model-btn:hover{background:var(--hover)}
  #model-btn .chev{color:var(--text-3)}
  #model-btn .sub{color:var(--text-3);font-weight:400;font-size:13px;margin-left:2px}
  .topbar-spacer{flex:1}
  .top-avatar{width:32px;height:32px;border-radius:50%;background:#5d5dff;display:flex;align-items:center;
              justify-content:center;font-size:14px;font-weight:600;color:#fff}

  /* popovers (model menu, account menu, item menu, regen menu) */
  .pop{position:absolute;background:var(--menu);border:1px solid var(--border);
       border-radius:14px;padding:6px;box-shadow:0 12px 32px rgba(0,0,0,.4);z-index:80;display:none}
  .pop.open{display:block}
  #model-menu{top:52px;left:14px;min-width:300px}
  #account-menu{bottom:64px;left:10px;min-width:236px}
  .model-opt,.menu-row{display:flex;align-items:flex-start;gap:12px;padding:10px 12px;border-radius:10px;width:100%;
             text-align:left;transition:background .15s;font-size:14px;color:var(--text)}
  .model-opt:hover,.menu-row:hover{background:var(--menu-hover)}
  .menu-row svg{flex-shrink:0;opacity:.85;margin-top:1px}
  .menu-row.danger{color:var(--danger)}
  .menu-sep{height:1px;background:var(--border);margin:6px 4px}
  .menu-head{padding:8px 12px 4px;font-size:12px;color:var(--text-3)}
  .menu-head b{color:var(--text);font-weight:500;font-size:13px;display:block;overflow:hidden;text-overflow:ellipsis}
  .model-opt .info .t{font-size:14px;font-weight:500}
  .model-opt .info .d{font-size:12px;color:var(--text-3);margin-top:1px}
  .model-opt .check{margin-left:auto;opacity:0;color:var(--text)}
  .model-opt.sel .check{opacity:1}

  /* ── Chat scroll area ──────────────────────────────── */
  #scroll{flex:1;overflow-y:auto;overflow-x:hidden}
  #thread{max-width:var(--maxw);margin:0 auto;padding:0 20px 16px;width:100%}

  /* landing / greeting (centered composer state) */
  #greeting{display:none;text-align:center;padding-bottom:6px}
  #greeting h1{font-size:28px;font-weight:600;letter-spacing:-.01em}

  /* feature view (Library / Sora / GPTs / Projects) */
  .feature{min-height:calc(100dvh - 120px);display:flex;flex-direction:column;align-items:center;
           justify-content:center;gap:8px;text-align:center;padding:0 20px}
  .feature .ficon{width:56px;height:56px;border-radius:16px;display:flex;align-items:center;
           justify-content:center;background:var(--hover);color:var(--text);margin-bottom:8px}
  .feature h2{font-size:22px;font-weight:600;color:var(--text)}
  .feature p{font-size:14px;color:var(--text-3);max-width:380px;line-height:1.55}
  body.viewing #dock{display:none}
  body.viewing #greeting{display:none}
  .nav-item.active{background:var(--hover)}
  body.landing #scroll{flex:0 0 auto}
  body.landing #thread{display:none}
  body.landing #dock{flex:1;display:flex;flex-direction:column;justify-content:center;padding-bottom:13vh}
  body.landing #greeting{display:block}
  body.landing #disclaimer{display:none}

  .msg{padding:18px 0;display:flex;gap:16px}
  .msg.user{justify-content:flex-end}
  .msg.assistant{justify-content:flex-start}
  .bubble{max-width:100%}
  .msg.user .grp{max-width:75%;display:flex;flex-direction:column;align-items:flex-end}
  .msg.user .bubble{background:var(--user-bubble);border-radius:22px;padding:10px 18px;
                    white-space:pre-wrap;word-wrap:break-word;overflow-wrap:anywhere}
  .msg.user .edit-area{width:min(75vw,560px);background:var(--user-bubble);border-radius:22px;padding:12px 16px}
  .msg.user .edit-area textarea{width:100%;background:none;border:none;outline:none;color:var(--text);
                    font-size:16px;line-height:1.5;resize:none}
  .msg.user .edit-row{display:flex;gap:8px;justify-content:flex-end;margin-top:8px}
  .msg.assistant .col{min-width:0;flex:1}
  .markdown{font-size:16px;line-height:1.75;word-wrap:break-word;overflow-wrap:anywhere}
  .markdown>*:first-child{margin-top:0}
  .markdown>*:last-child{margin-bottom:0}
  .markdown p{margin:0 0 16px}
  .markdown h1,.markdown h2,.markdown h3,.markdown h4{margin:24px 0 12px;font-weight:600;line-height:1.3}
  .markdown h1{font-size:1.6em}.markdown h2{font-size:1.35em}.markdown h3{font-size:1.15em}
  .markdown ul,.markdown ol{margin:0 0 16px;padding-left:26px}
  .markdown li{margin:6px 0}
  .markdown li>ul,.markdown li>ol{margin:6px 0}
  .markdown a{color:#7eb6ff;text-decoration:none}
  :root[data-theme="light"] .markdown a{color:#0b62d6}
  .markdown a:hover{text-decoration:underline}
  .markdown blockquote{border-left:3px solid var(--border);padding:2px 0 2px 16px;margin:0 0 16px;color:var(--text-2)}
  .markdown hr{border:none;border-top:1px solid var(--border);margin:24px 0}
  .markdown strong{font-weight:600}
  .markdown code:not(pre code){background:var(--hover);padding:2px 6px;border-radius:5px;font-family:var(--mono);
                               font-size:.875em}
  .markdown table{border-collapse:collapse;margin:0 0 16px;width:100%;font-size:.9em;display:block;overflow-x:auto}
  .markdown th,.markdown td{border:1px solid var(--border);padding:8px 14px;text-align:left}
  .markdown th{background:var(--code-head);font-weight:600}

  /* code blocks */
  .code-wrap{margin:0 0 16px;border-radius:10px;overflow:hidden;border:1px solid var(--border)}
  .code-head{display:flex;align-items:center;justify-content:space-between;background:var(--code-head);
             padding:6px 12px;font-size:12px;color:var(--text-2)}
  .code-copy{display:flex;align-items:center;gap:5px;font-size:12px;color:var(--text-2);
             padding:3px 6px;border-radius:5px;transition:color .15s}
  .code-copy:hover{color:var(--text)}
  .code-wrap pre{margin:0;background:var(--code-bg);padding:14px 16px;overflow-x:auto}
  .code-wrap pre code{font-family:var(--mono);font-size:13.5px;line-height:1.6;background:none;padding:0;
                      color:var(--text)}

  /* composer tool pill (Search) */
  .tool-pill{display:flex;align-items:center;gap:6px;height:34px;padding:0 13px;border-radius:17px;
             border:1px solid var(--border);color:var(--text-2);font-size:14px;flex-shrink:0;transition:all .15s}
  .tool-pill:hover{background:var(--hover);color:var(--text)}
  .tool-pill.on{background:rgba(126,182,255,.16);border-color:#7eb6ff;color:#7eb6ff}
  .tool-pill svg{flex-shrink:0}

  /* web-search status + sources */
  .searching{display:flex;align-items:center;gap:9px;color:var(--text-2);font-size:15px;padding:4px 0}
  .searching .spin{width:15px;height:15px;border:2px solid var(--text-3);border-top-color:transparent;
                   border-radius:50%;animation:spin .8s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  .sources{margin-top:14px}
  .sources-h{font-size:12px;color:var(--text-3);font-weight:600;margin-bottom:8px}
  .src-list{display:flex;flex-wrap:wrap;gap:8px}
  .src{display:flex;align-items:center;gap:6px;max-width:240px;background:var(--hover);border:1px solid var(--border);
       border-radius:10px;padding:6px 10px;font-size:12px;color:var(--text-2);text-decoration:none}
  .src:hover{background:var(--hover-2);color:var(--text)}
  .src svg{flex-shrink:0;opacity:.8}
  .src .dom{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

  /* reasoning / "Thinking" */
  .reasoning-live{color:var(--text-2);font-size:14px}
  .reasoning-live .rh{display:flex;align-items:center;gap:8px;color:var(--text-3);font-size:13px;margin-bottom:6px}
  .reasoning-live .rt{white-space:pre-wrap;line-height:1.6;max-height:180px;overflow:auto;color:var(--text-2)}
  .reasoning{margin:0 0 12px;border-left:2px solid var(--border);padding-left:12px}
  .reasoning summary{cursor:pointer;color:var(--text-3);font-size:13px;list-style:none;user-select:none}
  .reasoning summary::-webkit-details-marker{display:none}
  .reasoning summary::before{content:'▸ ';color:var(--text-3)}
  .reasoning[open] summary::before{content:'▾ '}
  .reasoning .rt{margin-top:8px;color:var(--text-2);font-size:13.5px;white-space:pre-wrap;line-height:1.65}

  /* thinking dots */
  .thinking{display:flex;gap:5px;padding:4px 0 2px}
  .thinking span{width:8px;height:8px;border-radius:50%;background:var(--text-3);
                 animation:bounce 1.2s infinite ease-in-out}
  .thinking span:nth-child(2){animation-delay:.18s}
  .thinking span:nth-child(3){animation-delay:.36s}
  @keyframes bounce{0%,80%,100%{transform:scale(.6);opacity:.5}40%{transform:scale(1);opacity:1}}

  /* assistant action row */
  .actions{display:flex;align-items:center;gap:2px;margin-top:6px;opacity:0;transition:opacity .15s}
  .msg.assistant:hover .actions,.msg.assistant.last .actions,.msg.user:hover .actions{opacity:1}
  .msg.user .actions{justify-content:flex-end}
  .act{width:30px;height:30px;border-radius:7px;display:flex;align-items:center;justify-content:center;
       color:var(--text-3);transition:all .15s;position:relative}
  .act:hover{background:var(--hover);color:var(--text)}
  .act.ok{color:#19c37d}
  .pager{display:flex;align-items:center;margin-right:2px}
  .pnum{font-size:12px;color:var(--text-3);min-width:30px;text-align:center}
  .pager .act{width:24px;height:24px;font-size:16px;line-height:1}

  /* streaming cursor */
  .cursor::after{content:'';display:inline-block;width:9px;height:18px;background:var(--text);
                 margin-left:2px;border-radius:1px;vertical-align:text-bottom;animation:blink 1s steps(2) infinite}
  @keyframes blink{0%,50%{opacity:1}50.01%,100%{opacity:0}}

  /* ── Composer ──────────────────────────────────────── */
  #dock{padding:0 20px 14px;flex-shrink:0}
  #composer-inner{max-width:var(--maxw);margin:0 auto}
  #composer{background:var(--composer);border:1px solid var(--composer-border);border-radius:26px;
            padding:10px 14px 9px;display:flex;flex-direction:column;gap:6px;
            box-shadow:0 2px 12px rgba(0,0,0,.18)}
  #composer .round{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;
                   color:var(--text);flex-shrink:0;transition:background .15s}
  #composer .round:hover{background:var(--hover)}
  #input{width:100%;background:none;border:none;outline:none;color:var(--text);font-size:16px;line-height:1.5;
         resize:none;max-height:200px;padding:4px 4px}
  .composer-row{display:flex;align-items:center;justify-content:space-between;gap:8px}
  .cr-left{display:flex;align-items:center;gap:6px;min-width:0}
  .cr-right{display:flex;align-items:center;gap:6px;flex-shrink:0}
  #input::placeholder{color:var(--text-3)}
  #send{width:36px;height:36px;border-radius:50%;background:var(--accent);color:var(--accent-fg);display:flex;
        align-items:center;justify-content:center;flex-shrink:0;transition:opacity .15s,background .15s}
  #send:disabled{background:#8886;color:#fff8;cursor:not-allowed}
  #disclaimer{text-align:center;font-size:12px;color:var(--text-3);padding:10px 0 2px}

  /* attachments */
  #attach-row{display:flex;flex-wrap:wrap;gap:8px;padding:2px 4px 8px}
  #attach-row:empty{display:none}
  .chip{display:flex;align-items:center;gap:7px;background:var(--hover);border:1px solid var(--border);
        border-radius:10px;padding:7px 10px;font-size:13px;max-width:220px}
  .chip svg{flex-shrink:0;color:var(--text-2)}
  .chip .nm{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .chip .x{cursor:pointer;color:var(--text-3);font-size:12px;line-height:1}
  .chip .x:hover{color:var(--text)}
  .bubble-atts{display:flex;flex-wrap:wrap;gap:6px;justify-content:flex-end;margin-bottom:6px}
  .chip.img{padding:5px 9px 5px 5px}
  .chip .thumb{width:34px;height:34px;border-radius:7px;object-fit:cover;flex-shrink:0}
  .bubble-img{max-width:240px;max-height:260px;border-radius:14px;display:block;border:1px solid var(--border)}
  .gen-img{max-width:min(100%,420px);border-radius:14px;margin:8px 0;display:block;border:1px solid var(--border)}

  /* scroll-to-bottom */
  #to-bottom{position:absolute;left:50%;transform:translateX(-50%);bottom:96px;width:34px;height:34px;
             border-radius:50%;background:var(--composer);border:1px solid var(--border);
             display:none;align-items:center;justify-content:center;color:var(--text);z-index:30;
             box-shadow:0 2px 10px rgba(0,0,0,.25)}
  #to-bottom.show{display:flex}

  /* ── Modal ─────────────────────────────────────────── */
  .overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);display:none;align-items:center;
           justify-content:center;z-index:100;backdrop-filter:blur(2px)}
  .overlay.open{display:flex}

<script>
// ── Markdown setup ──────────────────────────────────────────────────────
marked.setOptions({gfm:true, breaks:false});

function renderMarkdown(text){
  const raw = marked.parse(text || '');
  return DOMPurify.sanitize(raw);
}

function enhance(container){
  container.querySelectorAll('pre > code').forEach(code=>{
    if(code.dataset.enhanced) return;
    code.dataset.enhanced='1';
    const pre = code.parentElement;
    let lang = [...code.classList].find(c=>c.startsWith('language-'));
    lang = lang ? lang.replace('language-','') : 'text';
    try{ hljs.highlightElement(code); }catch(e){}
    const wrap = document.createElement('div'); wrap.className='code-wrap';
    const head = document.createElement('div'); head.className='code-head';
    head.innerHTML = `<span>${lang}</span><button class="code-copy">`+
      `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>Copy</button>`;
    pre.parentNode.insertBefore(wrap, pre);
    wrap.appendChild(head); wrap.appendChild(pre);
    head.querySelector('.code-copy').onclick=()=>{
      navigator.clipboard.writeText(code.innerText);
      const b=head.querySelector('.code-copy');
      b.innerHTML='<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>Copied';
      setTimeout(()=>b.innerHTML='<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>Copy',1500);
    };
  });
  if(window.renderMathInElement){
    try{ renderMathInElement(container,{delimiters:[
      {left:'$$',right:'$$',display:true},{left:'\\[',right:'\\]',display:true},

function _readDataURL(f){ return new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(String(r.result||''));r.onerror=rej;r.readAsDataURL(f);}); }
function _readText(f){ return new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(String(r.result||''));r.onerror=rej;r.readAsText(f);}); }

async function _extractPdf(f){
  if(!window.pdfjsLib){ throw new Error('pdf'); }
  if(!pdfjsLib.GlobalWorkerOptions.workerSrc)
    pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
  const buf=await f.arrayBuffer();
  const pdf=await pdfjsLib.getDocument({data:buf}).promise;
  let text='';
  for(let i=1;i<=pdf.numPages;i++){
    const tc=await (await pdf.getPage(i)).getTextContent();
    text += tc.items.map(it=>it.str).join(' ')+'\n\n';
    if(text.length>200000) break;
  }
  return text.slice(0,200000);
}
async function _extractDocx(f){
  if(!window.mammoth){ throw new Error('docx'); }
  const buf=await f.arrayBuffer();
  return ((await mammoth.extractRawText({arrayBuffer:buf})).value||'').slice(0,200000);
}

function onFiles(inp){
  const files=[...inp.files]; inp.value=''; closeAllPops();
  files.forEach(f=>addAttachment(f));
}
async function addAttachment(f){
  const lower=f.name.toLowerCase();
  try{
    if(f.type.startsWith('image/')){
      if(f.size>6500000){ showToast(f.name+' is too large (max ~6 MB).'); return; }
      attachments.push({name:f.name, kind:'image', url:await _readDataURL(f)}); renderAttachments(); return;
    }
    let content;
    if(f.type==='application/pdf' || lower.endsWith('.pdf')) content=await _extractPdf(f);
    else if(lower.endsWith('.docx')) content=await _extractDocx(f);
    else content=(await _readText(f)).slice(0,200000);
    attachments.push({name:f.name, kind:'text', content}); renderAttachments();
  }catch(e){
    showToast(e&&e.message==='pdf' ? 'PDF support still loading — try again.'
            : e&&e.message==='docx' ? 'DOCX support still loading — try again.'
            : 'Could not read '+f.name);
  }
}

// ── Drag-and-drop + paste to attach ─────────────────────────────────────
let _dragDepth=0;
const _hasFiles = e => !!(e.dataTransfer && Array.from(e.dataTransfer.types||[]).includes('Files'));
window.addEventListener('dragenter', e=>{ if(_hasFiles(e)){ e.preventDefault(); _dragDepth++; document.body.classList.add('dropping'); } });
window.addEventListener('dragover',  e=>{ if(_hasFiles(e)) e.preventDefault(); });
window.addEventListener('dragleave', e=>{ if(_hasFiles(e)){ _dragDepth=Math.max(0,_dragDepth-1); if(!_dragDepth) document.body.classList.remove('dropping'); } });
window.addEventListener('drop', e=>{
  if(e.dataTransfer && e.dataTransfer.files && e.dataTransfer.files.length){
    e.preventDefault(); _dragDepth=0; document.body.classList.remove('dropping');
    if(!getKey()){ openKeyModal(); return; }
    Array.from(e.dataTransfer.files).forEach(f=>addAttachment(f));
  }
});
input.addEventListener('paste', e=>{
  const items = e.clipboardData && e.clipboardData.items; if(!items) return;
  let handled=false;
  for(const it of items){
    if(it.kind==='file'){ const f=it.getAsFile(); if(f){ addAttachment(f); handled=true; } }
  }
  if(handled) e.preventDefault();  // only intercept files; let normal text paste through
});
function renderAttachments(){

function activeConvo(){ return tempMode ? tempConvo : convos.find(c=>c.id===activeId); }

function persist(){
  if(tempMode) return;   // temporary chats are never saved
  try{ localStorage.setItem('cg_convos', JSON.stringify(convos.slice(0,120))); }
  catch(e){   // quota (large images) — store a slimmed copy without image data
    try{
      const slim=convos.slice(0,120).map(c=>({...c, messages:(c.messages||[]).map(m=>{
        let mm=m;
        if(m.atts) mm={...mm, atts:m.atts.map(a=> a.kind==='image' ? {name:a.name, kind:'image'} : a)};
        if(m.variants) mm={...mm, variants:m.variants.map(v=> v.image ? {...v, image:null} : v)};
        return mm;
      })}));
      localStorage.setItem('cg_convos', JSON.stringify(slim));
    }catch(_){}
  }
}

function dateGroup(ts){
  const d=new Date(ts), n=new Date();
  const day=864e5, today=new Date(n.getFullYear(),n.getMonth(),n.getDate()).getTime();
  if(ts>=today) return 'Today';
  if(ts>=today-day) return 'Yesterday';
  if(ts>=today-7*day) return 'Previous 7 Days';
  if(ts>=today-30*day) return 'Previous 30 Days';
  return 'Older';
}

function renderChatList(){

      (c.messages||[]).some(m=>msgText(m).toLowerCase().includes(q)));
  if(!shown.length){
    if(q){ const e=document.createElement('div'); e.className='empty-list'; e.textContent='No chats found.'; list.appendChild(e); }
    return;
  }
  let lastGroup=null;
  shown.forEach(c=>{
    if(!q){
      const g=dateGroup(c.ts||0);
      if(g!==lastGroup){ lastGroup=g; const h=document.createElement('div'); h.className='sb-section'; h.textContent=g; list.appendChild(h); }

  const commit=()=>{ if(done) return; done=true; c.title=(inp.value.trim()||c.title||'New chat'); persist(); renderChatList(); };
  inp.addEventListener('keydown',e=>{ if(e.key==='Enter'){e.preventDefault();commit();} if(e.key==='Escape'){done=true;renderChatList();} });
  inp.addEventListener('blur',commit);
  inp.addEventListener('click',e=>e.stopPropagation());
}

function renderMessage(m, idx){
  const msg=document.createElement('div'); msg.className='msg '+m.role;
  if(m.role==='user'){
    const ucontent=msgText(m);
    const unver=(m.variants&&m.variants.length)||1;

    const attHtml=(m.atts&&m.atts.length)?`<div class="bubble-atts">`+m.atts.map(a=>
        a.kind==='image'
          ? (a.url
              ? `<img class="bubble-img" src="${a.url}" alt="${escapeHtml(a.name)}">`
              : `<span class="chip"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="9" cy="9" r="2"/><path d="m21 15-3.1-3.1a2 2 0 0 0-2.8 0L6 21"/></svg><span class="nm">${escapeHtml(a.name)}</span></span>`)
          : `<span class="chip"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg><span class="nm">${escapeHtml(a.name)}</span></span>`
      ).join('')+`</div>`:'';
    msg.innerHTML=`<div class="grp">
        ${attHtml}
        <div class="bubble"></div>
        <div class="actions">
          ${upager}
          <button class="act act-edit" title="Edit message"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20h9"/><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg></button>
          <button class="act act-ucopy" title="Copy"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg></button>
        </div>
      </div>`;
    const bub=msg.querySelector('.bubble'); bub.textContent=ucontent; if(!ucontent) bub.style.display='none';

  } else {

    const isLast = idx===activeMsgs().length-1;
    const nver = (m.variants&&m.variants.length)||1;
    const pager = (nver>1 && isLast)
      ? `<span class="pager"><button class="act act-prev" title="Previous">‹</button><span class="pnum">${m.vi+1}/${nver}</span><button class="act act-next" title="Next">›</button></span>` : '';
    const srcs=(m.variants&&m.variants[m.vi]&&m.variants[m.vi].sources)||[];
    const srcHtml = srcs.length ? `<div class="sources"><div class="sources-h">Sources</div><div class="src-list">`+
      srcs.map(s=>{ let host=''; try{host=new URL(s.url).hostname.replace(/^www\./,'');}catch(e){host=s.url;}
        return `<a class="src" href="${encodeURI(s.url)}" target="_blank" rel="noopener noreferrer" title="${escapeHtml(s.title||s.url)}"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg><span class="dom">${escapeHtml(host)}</span></a>`;
      }).join('')+`</div></div>` : '';
    const rsn=(m.variants&&m.variants[m.vi]&&m.variants[m.vi].reasoning)||'';
    const rsnHtml = rsn ? `<details class="reasoning"><summary>Thought process</summary><div class="rt">${escapeHtml(rsn)}</div></details>` : '';
    const gimg=(m.variants&&m.variants[m.vi]&&m.variants[m.vi].image)||'';
    const gimgHtml = gimg ? `<img class="gen-img" src="${gimg}">` : '';
    msg.innerHTML=`<div class="col">${rsnHtml}<div class="markdown"></div>
        ${gimgHtml}
        ${srcHtml}
        <div class="actions">
          ${pager}
          <button class="act act-copy" title="Copy"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg></button>
          <button class="act act-good" title="Good response"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M7 10v12"/><path d="M15 5.88 14 10h5.83a2 2 0 0 1 1.92 2.56l-2.33 8A2 2 0 0 1 17.5 22H4a2 2 0 0 1-2-2v-8a2 2 0 0 1 2-2h2.76a2 2 0 0 0 1.79-1.11L12 2a3.13 3.13 0 0 1 3 3.88Z"/></svg></button>
          <button class="act act-bad" title="Bad response"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 14V2"/><path d="M9 18.12 10 14H4.17a2 2 0 0 1-1.92-2.56l2.33-8A2 2 0 0 1 6.5 2H20a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2h-2.76a2 2 0 0 0-1.79 1.11L12 22a3.13 3.13 0 0 1-3-3.88Z"/></svg></button>
          <button class="act act-read" title="Read aloud"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/></svg></button>
          <button class="act act-regen" title="Regenerate"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12a9 9 0 0 1 15-6.7L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-15 6.7L3 16"/><path d="M3 21v-5h5"/></svg></button>
        </div>
      </div>`;
    const md=msg.querySelector('.markdown');
    if(content){ md.innerHTML=renderMarkdown(content); enhance(md); }
    msg.querySelector('.act-copy').onclick=(e)=>copyBtn(e.currentTarget, content);
    if(m.rating==='up') msg.querySelector('.act-good').classList.add('ok');
    if(m.rating==='down') msg.querySelector('.act-bad').classList.add('ok');
    msg.querySelector('.act-good').onclick=()=>{ m.rating=m.rating==='up'?null:'up'; persist(); renderThread(); };
    msg.querySelector('.act-bad').onclick=()=>{ m.rating=m.rating==='down'?null:'down'; persist(); renderThread(); };
    msg.querySelector('.act-read').onclick=(e)=>readAloud(content, e.currentTarget);
    msg.querySelector('.act-regen').onclick=(e)=>{e.stopPropagation();regenMenu(e.currentTarget, idx);};
    if(pager){
      msg.querySelector('.act-prev').onclick=()=>{ if(m.vi>0){ m.vi--; persist(); renderThread(); } };
      msg.querySelector('.act-next').onclick=()=>{ if(m.vi<nver-1){ m.vi++; persist(); renderThread(); } };
    }
  }
  thread.appendChild(msg);
  return msg;
}

function copyBtn(btn, text){
  navigator.clipboard.writeText(text||'');
  btn.classList.add('ok'); setTimeout(()=>btn.classList.remove('ok'),1200);
}

function startEdit(idx, msgEl){
  const m=activeMsgs()[idx]; if(!m) return;
  const grp=msgEl.querySelector('.grp');
  grp.innerHTML=`<div class="edit-area">
      <textarea rows="1"></textarea>
      <div class="edit-row">
        <button class="btn btn-ghost btn-sm" data-act="cancel">Cancel</button>
        <button class="btn btn-primary btn-sm" data-act="send">Send</button>
      </div></div>`;
  const ta=grp.querySelector('textarea');
  ta.value=msgText(m); ta.style.height='auto'; ta.style.height=Math.min(ta.scrollHeight,260)+'px';
  ta.focus(); ta.setSelectionRange(ta.value.length, ta.value.length);
  ta.oninput=()=>{ ta.style.height='auto'; ta.style.height=Math.min(ta.scrollHeight,260)+'px'; };
  grp.querySelector('[data-act="cancel"]').onclick=()=>renderThread();
  grp.querySelector('[data-act="send"]').onclick=()=>{
    const v=ta.value.trim(); if(!v) return;
    const c=activeConvo(); if(!c) return;
    const node=c.messages[idx]; if(!node||node.role!=='user') return;
    // upgrade a legacy user node to the versioned form
    if(!node.variants){ node.variants=[{content:node.content||'',ts:node.ts}]; node.vi=0; delete node.content; }
    if(!node.alts) node.alts={};
    // stash the current downstream branch under the current version, then start a new version
    node.alts[node.vi]=c.messages.slice(idx+1);
    node.variants.push({content:v,ts:now()}); node.vi=node.variants.length-1; node.alts[node.vi]=[];
    c.messages=c.messages.slice(0,idx+1);
    c.messages.push({role:'assistant',variants:[{content:'',ts:now()}],vi:0});
    persist();
    streamReply();
  };
  ta.onkeydown=(e)=>{ if(e.key==='Enter'&&!e.shiftKey){ e.preventDefault(); grp.querySelector('[data-act="send"]').click(); } };
}

function switchUserVersion(idx, dir){
  if(generating) return;
  const c=activeConvo(); if(!c) return;
  const node=c.messages[idx]; if(!node||!node.variants) return;
  const ni=node.vi+dir; if(ni<0||ni>=node.variants.length) return;
  if(!node.alts) node.alts={};
  node.alts[node.vi]=c.messages.slice(idx+1);   // save current branch
  node.vi=ni;
  c.messages=c.messages.slice(0,idx+1).concat(node.alts[node.vi]||[]);  // restore target branch
  persist(); renderThread(); setLanding(); scrollBottom(true);
}

function regenerate(model, idx, hint){
  if(generating) return;
  const c=activeConvo(); if(!c) return;
  if(idx==null){ idx=c.messages.length-1; while(idx>=0 && c.messages[idx].role!=='assistant') idx--; }
  if(idx<0) return;
  if(idx===c.messages.length-1){
    // regenerate the last answer -> add a new sibling version (no truncation)
    const m=c.messages[idx];
    m.variants=m.variants||[{content:m.content||'',ts:m.ts}];
    m.variants.push({content:'',ts:now()}); m.vi=m.variants.length-1;
  } else {
    // older message -> drop it and everything after, then a fresh answer
    c.messages=c.messages.slice(0,idx);
    c.messages.push({role:'assistant',variants:[{content:'',ts:now()}],vi:0});
  }
  persist(); scrollBottom(true);
  streamReply(model||currentModel, hint);
}

function markLast(){
  thread.querySelectorAll('.msg.assistant').forEach(m=>m.classList.remove('last'));
  const all=thread.querySelectorAll('.msg.assistant');
  if(all.length) all[all.length-1].classList.add('last');
}

function scrollBottom(force){
  const near = scroll.scrollHeight - scroll.scrollTop - scroll.clientHeight < 120;
  if(force||near) scroll.scrollTop=scroll.scrollHeight;
}
scroll.addEventListener('scroll',()=>{
  const far = scroll.scrollHeight - scroll.scrollTop - scroll.clientHeight > 200;
  $('#to-bottom').classList.toggle('show', far && !document.body.classList.contains('landing'));
});

const micBtn=$('#mic');
const micSupported = !!(window.SpeechRecognition||window.webkitSpeechRecognition);

function updateComposerButtons(){
  const hasText=!!input.value.trim() || attachments.length>0;
  if(generating){ sendBtn.style.display='flex'; sendBtn.disabled=false; if(micBtn) micBtn.style.display='none'; return; }

}
function autosize(el){ el.style.height='auto'; el.style.height=Math.min(el.scrollHeight,200)+'px'; updateComposerButtons(); }
function onKey(e){ if(e.key==='Enter'&&!e.shiftKey){ e.preventDefault(); onSend(e); } }

function setGenerating(on){
  generating=on;
  if(on){
    sendBtn.innerHTML='<svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="6" width="12" height="12" rx="2.5"/></svg>';
  } else {
    sendBtn.innerHTML='<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/></svg>';
  }
  updateComposerButtons();
}

// Dictation (Web Speech API; best-effort, mic only shown when supported)
let rec=null, reccing=false;
function toggleDictate(){
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition; if(!SR) return;
  if(reccing){ try{rec&&rec.stop();}catch(e){} return; }
  rec=new SR(); rec.lang='en-US'; rec.interimResults=true; rec.continuous=true;
  const base=input.value;
  rec.onresult=(e)=>{ let t=''; for(let i=e.resultIndex;i<e.results.length;i++) t+=e.results[i][0].transcript; input.value=(base?base+' ':'')+t; autosize(input); };
  rec.onend=()=>{ reccing=false; if(micBtn) micBtn.classList.remove('ok'); updateComposerButtons(); };
  rec.onerror=()=>{ reccing=false; if(micBtn) micBtn.classList.remove('ok'); };
  try{ rec.start(); reccing=true; if(micBtn) micBtn.classList.add('ok'); }catch(e){}
}

// Read aloud (Web Speech synthesis)
let speakBtn=null;
function readAloud(text, btn){
  const synth=window.speechSynthesis; if(!synth) return;
  const wasThis = synth.speaking && speakBtn===btn;
  if(synth.speaking){ synth.cancel(); if(speakBtn) speakBtn.classList.remove('ok'); speakBtn=null; if(wasThis) return; }
  const plain=(text||'').replace(/```[\s\S]*?```/g,' ').replace(/[#*`_>~\[\]()]/g,'');
  const u=new SpeechSynthesisUtterance(plain);
  u.onend=()=>{ btn.classList.remove('ok'); speakBtn=null; };
  try{ synth.speak(u); btn.classList.add('ok'); speakBtn=btn; }catch(e){}
}

// Share the current conversation
function shareChat(){
  const c=activeConvo(); if(!c||!c.messages.length) return;
  const text=c.messages.map(m=> (m.role==='user'?'You: ':'ChatGPT: ')+msgText(m)).join('\n\n');
  if(navigator.share){ navigator.share({title:c.title||'ChatGPT', text}).catch(()=>{}); }
  else { navigator.clipboard.writeText(text); showToast('Conversation copied to clipboard'); }
}

async function onSend(e){
  if(e) e.preventDefault();
  if(generating){ if(abortCtl) abortCtl.abort(); return; }
  const text=input.value.trim();
  if(!text && !attachments.length) return;
  if(!getKey()){ openKeyModal(); return; }
  const atts=attachments.slice(); attachments=[]; renderAttachments();
  input.value=''; autosize(input);
  const c=ensureConvo();
  const um={role:'user',content:text,ts:now()}; if(atts.length) um.atts=atts;
  c.messages.push(um);
  c.messages.push({role:'assistant',variants:[{content:'',ts:now()}],vi:0});
  c.ts=now();
  if(!c.title){ const seed=text || (atts[0]&&atts[0].name) || 'New chat'; c.title=seed.replace(/\s+/g,' ').trim().slice(0,48); }
  persist(); renderChatList();
  streamReply();
}

async function streamReply(model, hint){
  const c=activeConvo(); if(!c) return;
  model = model || currentModel;
  // contract: the LAST message is an assistant whose current variant is the empty target
  let target=c.messages[c.messages.length-1];
  if(!target || target.role!=='assistant'){ target={role:'assistant',variants:[{content:'',ts:now()}],vi:0}; c.messages.push(target); }
  const sendMsgs = c.messages.slice(0, c.messages.length-1).map(m=>{
    if(m.role==='user' && m.atts && m.atts.length){
      const textFiles=m.atts.filter(a=>a.kind!=='image');
      const imgs=m.atts.filter(a=>a.kind==='image' && a.url);
      const folded=textFiles.map(a=>`[File: ${a.name}]\n${a.content}`).join('\n\n');
      const t=msgText(m);
      const textPart = folded ? (folded + (t ? '\n\n'+t : '')) : t;
      if(imgs.length){
        const parts=[];
        if(textPart) parts.push({type:'text', text:textPart});
        imgs.forEach(a=>parts.push({type:'image_url', image_url:a.url}));
        return {role:'user', content:parts};
      }
      return {role:'user', content:textPart};
    }
    return {role:m.role, content:msgText(m)};
  });
  if(hint) sendMsgs.push({role:'user', content:hint});  // transient steering, not stored

  // render thread (shows empty target) then stream into the last assistant element
  renderThread(); setLanding();
  const allA=thread.querySelectorAll('.msg.assistant');
  const msgEl=allA[allA.length-1];
  const md=msgEl.querySelector('.markdown');
  md.innerHTML='<div class="thinking"><span></span><span></span><span></span></div>';
  markLast(); scrollBottom(true);
  setGenerating(true);
  abortCtl=new AbortController();
  let full=''; let firstToken=false; let raf=null; let sources=[]; let thinking=''; let genImage='';
  const paint=()=>{ md.innerHTML=renderMarkdown(full); md.classList.add('cursor'); scrollBottom(); raf=null; };

  try{
    const resp=await fetch('/api/chat',{
      method:'POST',
      headers:{'Content-Type':'application/json','X-PWM-Key':getKey()},
      body:JSON.stringify({messages:sendMsgs, model, stream:true, web_search:webSearch, image_gen:imageGen}),
      signal:abortCtl.signal
    });
    if(!resp.ok){
      const err=await resp.json().catch(()=>({detail:resp.statusText}));
      throw new Error(err.detail||('HTTP '+resp.status));
    }
    const reader=resp.body.getReader(); const dec=new TextDecoder();
    let buf='';
    while(true){
      const {done,value}=await reader.read(); if(done) break;
      buf+=dec.decode(value,{stream:true});
      const lines=buf.split('\n'); buf=lines.pop();
      for(const line of lines){
        if(!line.startsWith('data:')) continue;
        const d=line.slice(5).trim();
        if(!d||d==='[DONE]') continue;
        try{
          const o=JSON.parse(d);
          if(o.status==='searching' && !firstToken){ md.innerHTML='<div class="searching"><span class="spin"></span> Searching the web…</div>'; }
          if(o.source && /^https?:\/\//.test(o.source.url) && !sources.some(s=>s.url===o.source.url)) sources.push(o.source);
          if(o.reasoning){ thinking+=o.reasoning; if(!firstToken){ let live=md.querySelector('.reasoning-live .rt'); if(!live){ md.innerHTML='<div class="reasoning-live"><div class="rh"><span class="spin"></span> Thinking…</div><div class="rt"></div></div>'; live=md.querySelector('.reasoning-live .rt'); } live.textContent=thinking; scrollBottom(); } }
          if(o.status==='generating_image' && !firstToken){ md.innerHTML='<div class="searching"><span class="spin"></span> Creating image…</div>'; }
          if(o.image){ genImage=o.image; let im=msgEl.querySelector('.gen-img'); if(!im){ if(md.querySelector('.thinking,.searching,.reasoning-live')) md.innerHTML=''; im=document.createElement('img'); im.className='gen-img'; const col=md.parentElement; col.insertBefore(im, col.querySelector('.actions')); } im.src=genImage; scrollBottom(); }
          const delta=(o.choices&&o.choices[0]&&o.choices[0].delta&&o.choices[0].delta.content)||'';
          if(delta){ if(!firstToken){firstToken=true; md.innerHTML='';} full+=delta; if(!raf) raf=requestAnimationFrame(paint); }
          if(o.error){ throw new Error(o.error.message||'stream error'); }
        }catch(_){}
      }
    }
  }catch(err){
    if(err.name!=='AbortError'){ showToast(err.message); }
  }finally{
    if(raf) cancelAnimationFrame(raf);
    md.classList.remove('cursor');
    if(full.trim() || genImage){
      target.variants[target.vi].content=full; target.variants[target.vi].ts=now();
      if(sources.length) target.variants[target.vi].sources=sources;
      if(thinking.trim()) target.variants[target.vi].reasoning=thinking;
      if(genImage) target.variants[target.vi].image=genImage;
      c.ts=now();
      persist(); renderChatList(); renderThread();
    } else {
      md.innerHTML='<span style="color:var(--text-3)">No response.</span>';
    }
    setGenerating(false); abortCtl=null;
    scrollBottom();
  }
}

// ── Account / settings ──────────────────────────────────────────────────
let settingsMode='key';
function openKeyModal(){ settingsMode='key'; openSettingsModal(); }
function openSettings(){
  closeAllPops();

}
function openSettingsModal(){
  const full = settingsMode==='full';
  $('#settings-title').textContent = full ? 'Settings' : 'Log in to ChatGPT';
  $('#settings-desc').textContent = full
    ? 'Manage your account, appearance, and chats. Everything is stored only in this browser.'
    : "Enter your access key to start chatting. It's stored only in this browser.";

  $('#key-input').value=getKey();

  sel.innerHTML=MODELS.map(m=>`<option value="${m.id}" ${m.id===currentModel?'selected':''}>${m.name}</option>`).join('');
  applyTheme();
  $('#settings-overlay').classList.add('open');
  refreshBalance();
  $('#key-input').focus();
}
function closeSettings(){ $('#settings-overlay').classList.remove('open'); }
function saveKey(){
  const k=$('#key-input').value.trim();
  if(k) localStorage.setItem('cg_pwm_key',k);
  updateAccount(); closeSettings();
}
function setDefaultModel(id){ pickModel(id); }
function deleteAllChats(){
  if(!confirm('Delete all chats on this device? This cannot be undone.')) return;
  convos=[]; activeId=null; persist(); renderThread(); renderChatList(); setLanding(); closeSettings();
}
function logout(){
  closeAllPops();
  localStorage.removeItem('cg_pwm_key'); updateAccount(); openKeyModal();
}
$('#key-input').addEventListener('keydown',e=>{ if(e.key==='Enter') saveKey(); });

async function refreshBalance(){
  const k=getKey(); const line=$('#balance-line');
  if(!k){ line.textContent=''; return; }
  line.textContent='Checking balance…';
  try{
    const r=await fetch('/api/balance',{headers:{'X-PWM-Key':k}});
    const d=await r.json();
    if(d.valid && d.balance!=null) line.textContent=`Balance: ${Number(d.balance).toFixed(2)} PWM`;
    else line.textContent=d.reason||'Could not verify balance.';
  }catch(e){ line.textContent=''; }
}

function updateAccount(){
  const k=getKey();
  $('#acct-sub').textContent = k ? 'Manage account' : 'Log in';
}
function refreshAccountHead(){
  const k=getKey();
  $('#acct-head-key').textContent = k ? 'ChatGPT account' : 'Not signed in';
  const bal=$('#acct-head-bal'); bal.textContent = k ? '' : 'Log in to start';
  if(k){
    fetch('/api/balance',{headers:{'X-PWM-Key':k}}).then(r=>r.json()).then(d=>{
      bal.textContent = (d.valid && d.balance!=null) ? `${Number(d.balance).toFixed(2)} PWM available` : (d.reason||'');
    }).catch(()=>{ bal.textContent=''; });
  }
}

// ── Init ────────────────────────────────────────────────────────────────
(function init(){
  applyTheme();
  pickModel(currentModel);
  renderThread(); renderChatList(); updateAccount(); setLanding();
  updateComposerButtons();
  if(window.innerWidth<=768) $('#sidebar').classList.add('collapsed');
  if(!getKey()) openKeyModal();
  input.focus();
})();
</script>
