<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>ChatGPT</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Cpath fill='%23fff' d='M22.28 9.82a5.98 5.98 0 0 0-.52-4.91 6.05 6.05 0 0 0-6.51-2.9A6.07 6.07 0 0 0 4.98 4.18a5.98 5.98 0 0 0-4 2.9 6.05 6.05 0 0 0 .75 7.1 5.98 5.98 0 0 0 .51 4.91 6.05 6.05 0 0 0 6.51 2.9A5.98 5.98 0 0 0 13.26 24a6.06 6.06 0 0 0 5.77-4.21 5.99 5.99 0 0 0 4-2.9 6.06 6.06 0 0 0-.75-7.07z'/%3E%3C/svg%3E">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
<script src="https://cdn.jsdelivr.net/npm/marked@12.0.0/marked.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/dompurify@3.0.9/dist/purify.min.js"></script>
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>

<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{
    --bg:#212121; --sidebar:#171717; --composer:#303030; --composer-border:rgba(255,255,255,.08);
    --user-bubble:#303030; --text:#ececec; --text-2:#b4b4b4; --text-3:#8e8e9e;
    --hover:#2f2f2f; --hover-2:#212121; --border:rgba(255,255,255,.1);
    --accent:#fff; --code-bg:#0d0d0d; --code-head:#2a2a2a;
    --sb-w:260px; --maxw:768px;
    --font:"Söhne",ui-sans-serif,-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif,"Apple Color Emoji","Segoe UI Emoji";
    --mono:ui-monospace,"SF Mono",SFMono-Regular,Menlo,Consolas,"Liberation Mono",monospace;
  }
  html,body{height:100%}
  body{font-family:var(--font);background:var(--bg);color:var(--text);font-size:16px;line-height:1.5;
       -webkit-font-smoothing:antialiased;overflow:hidden}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
  ::-webkit-scrollbar{width:8px;height:8px}
  ::-webkit-scrollbar-thumb{background:#4d4d4d;border-radius:8px}
  ::-webkit-scrollbar-thumb:hover{background:#5d5d5d}
  ::-webkit-scrollbar-track{background:transparent}

  #app{display:flex;height:100dvh;overflow:hidden}

  /* ── Sidebar ───────────────────────────────────────── */
  #sidebar{width:var(--sb-w);background:var(--sidebar);display:flex;flex-direction:column;
           flex-shrink:0;transition:margin-left .2s ease;overflow:hidden}
  #sidebar.collapsed{margin-left:calc(var(--sb-w) * -1)}
  .sb-top{display:flex;align-items:center;justify-content:space-between;padding:10px 8px 4px}
  .icon-btn{width:34px;height:34px;border-radius:8px;display:flex;align-items:center;justify-content:center;
            color:var(--text);transition:background .15s}
  .icon-btn:hover{background:var(--hover)}
  .sb-nav{padding:4px 8px}
  .nav-item{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:8px;font-size:14px;
            color:var(--text);transition:background .15s;width:100%;text-align:left}
  .nav-item:hover{background:var(--hover)}
  .nav-item svg{flex-shrink:0;opacity:.9}
  .sb-section{padding:16px 12px 6px;font-size:12px;color:var(--text-3);font-weight:600}
  #chat-list{flex:1;overflow-y:auto;padding:0 8px}
  .chat-item{position:relative;display:flex;align-items:center;padding:8px 10px;border-radius:8px;
             font-size:14px;color:var(--text);white-space:nowrap;overflow:hidden;margin-bottom:1px;
             transition:background .15s}
  .chat-item:hover{background:var(--hover)}
  .chat-item.active{background:#2f2f2f}
  .chat-item .title{flex:1;overflow:hidden;text-overflow:ellipsis}
  .chat-item .del{opacity:0;width:26px;height:26px;border-radius:6px;display:flex;align-items:center;
                  justify-content:center;flex-shrink:0;color:var(--text-2)}
  .chat-item:hover .del{opacity:1}
  .chat-item .del:hover{background:#404040;color:var(--text)}
  .sb-foot{padding:8px;border-top:1px solid var(--border)}
  .account{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:8px;width:100%;
           text-align:left;transition:background .15s}
  .account:hover{background:var(--hover)}
  .avatar-sm{width:28px;height:28px;border-radius:50%;background:#5d5dff;display:flex;align-items:center;
             justify-content:center;font-size:13px;font-weight:600;color:#fff;flex-shrink:0}
  .account .meta{overflow:hidden}
  .account .meta .name{font-size:14px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .account .meta .sub{font-size:12px;color:var(--text-3)}

  /* ── Main ──────────────────────────────────────────── */
  #main{flex:1;display:flex;flex-direction:column;min-width:0;position:relative}
  #topbar{display:flex;align-items:center;gap:6px;padding:10px 14px;height:52px;flex-shrink:0}
  .menu-toggle{display:none}
  #model-btn{display:flex;align-items:center;gap:6px;padding:8px 12px;border-radius:10px;font-size:18px;
             font-weight:500;color:var(--text);transition:background .15s}
  #model-btn:hover{background:var(--hover)}
  #model-btn .chev{color:var(--text-3)}
  #model-btn .sub{color:var(--text-3);font-weight:400;font-size:13px;margin-left:2px}
  .topbar-spacer{flex:1}
  .top-avatar{width:32px;height:32px;border-radius:50%;background:#5d5dff;display:flex;align-items:center;
              justify-content:center;font-size:14px;font-weight:600;color:#fff}

  /* model dropdown */
  #model-menu{position:absolute;top:52px;left:14px;background:#2a2a2a;border:1px solid var(--border);
              border-radius:14px;padding:6px;min-width:300px;box-shadow:0 12px 32px rgba(0,0,0,.4);
              z-index:50;display:none}
  #model-menu.open{display:block}
  .model-opt{display:flex;align-items:flex-start;gap:12px;padding:10px 12px;border-radius:10px;width:100%;
             text-align:left;transition:background .15s}
  .model-opt:hover{background:#3a3a3a}
  .model-opt .info .t{font-size:14px;font-weight:500}
  .model-opt .info .d{font-size:12px;color:var(--text-3);margin-top:1px}
  .model-opt .check{margin-left:auto;opacity:0;color:var(--text)}
  .model-opt.sel .check{opacity:1}

  /* ── Chat scroll area ──────────────────────────────── */
  #scroll{flex:1;overflow-y:auto;overflow-x:hidden}
  #thread{max-width:var(--maxw);margin:0 auto;padding:0 20px 16px;width:100%}

  /* welcome */
  #welcome{height:calc(100dvh - 52px - 130px);display:flex;flex-direction:column;align-items:center;
           justify-content:center;gap:28px;text-align:center}
  #welcome h1{font-size:28px;font-weight:600;letter-spacing:-.01em}

  .msg{padding:18px 0;display:flex;gap:16px}
  .msg.user{justify-content:flex-end}
  .msg.assistant{justify-content:flex-start}
  .msg .logo{width:30px;height:30px;border-radius:50%;border:1px solid var(--border);display:flex;
             align-items:center;justify-content:center;flex-shrink:0;background:var(--bg)}
  .msg .logo svg{width:18px;height:18px}
  .bubble{max-width:100%}
  .msg.user .bubble{background:var(--user-bubble);border-radius:22px;padding:10px 18px;max-width:75%;
                    white-space:pre-wrap;word-wrap:break-word}
  .msg.assistant .col{min-width:0;flex:1}
  .markdown{font-size:16px;line-height:1.75;word-wrap:break-word;overflow-wrap:anywhere}
  .markdown>*:first-child{margin-top:0}
  .markdown>*:last-child{margin-bottom:0}
  .markdown p{margin:0 0 16px}
  .markdown h1,.markdown h2,.markdown h3,.markdown h4{margin:24px 0 12px;font-weight:600;line-height:1.3}
  .markdown h1{font-size:1.6em}.markdown h2{font-size:1.35em}.markdown h3{font-size:1.15em}
  .markdown ul,.markdown ol{margin:0 0 16px;padding-left:26px}
  .markdown li{margin:6px 0}
  .markdown li>ul,.markdown li>ol{margin:6px 0}
  .markdown a{color:#7eb6ff;text-decoration:none}
  .markdown a:hover{text-decoration:underline}
  .markdown blockquote{border-left:3px solid #4d4d4d;padding:2px 0 2px 16px;margin:0 0 16px;color:var(--text-2)}
  .markdown hr{border:none;border-top:1px solid var(--border);margin:24px 0}
  .markdown strong{font-weight:600}
  .markdown code:not(pre code){background:#2f2f2f;padding:2px 6px;border-radius:5px;font-family:var(--mono);
                               font-size:.875em}
  .markdown table{border-collapse:collapse;margin:0 0 16px;width:100%;font-size:.9em;display:block;overflow-x:auto}
  .markdown th,.markdown td{border:1px solid var(--border);padding:8px 14px;text-align:left}
  .markdown th{background:#2a2a2a;font-weight:600}

  /* code blocks */
  .code-wrap{margin:0 0 16px;border-radius:10px;overflow:hidden;border:1px solid var(--border)}
  .code-head{display:flex;align-items:center;justify-content:space-between;background:var(--code-head);
             padding:6px 12px;font-size:12px;color:var(--text-2)}
  .code-copy{display:flex;align-items:center;gap:5px;font-size:12px;color:var(--text-2);
             padding:3px 6px;border-radius:5px;transition:color .15s}
  .code-copy:hover{color:var(--text)}
  .code-wrap pre{margin:0;background:var(--code-bg);padding:14px 16px;overflow-x:auto}
  .code-wrap pre code{font-family:var(--mono);font-size:13.5px;line-height:1.6;background:none;padding:0}

  /* assistant action row */
  .actions{display:flex;gap:2px;margin-top:6px;opacity:0;transition:opacity .15s}
  .msg.assistant:hover .actions,.msg.assistant.last .actions{opacity:1}
  .act{width:30px;height:30px;border-radius:7px;display:flex;align-items:center;justify-content:center;
       color:var(--text-3);transition:all .15s}
  .act:hover{background:var(--hover);color:var(--text)}
  .act.ok{color:#19c37d}

  /* streaming cursor */
  .cursor::after{content:'';display:inline-block;width:9px;height:18px;background:var(--text);
                 margin-left:2px;border-radius:1px;vertical-align:text-bottom;animation:blink 1s steps(2) infinite}
  @keyframes blink{0%,50%{opacity:1}50.01%,100%{opacity:0}}

  /* ── Composer ──────────────────────────────────────── */
  #composer-wrap{padding:0 20px 14px;flex-shrink:0}
  #composer-inner{max-width:var(--maxw);margin:0 auto}
  #composer{background:var(--composer);border:1px solid var(--composer-border);border-radius:28px;
            padding:8px 8px 8px 8px;display:flex;align-items:flex-end;gap:6px;
            box-shadow:0 2px 12px rgba(0,0,0,.2)}
  #composer .round{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;
                   color:var(--text);flex-shrink:0;transition:background .15s}
  #composer .round:hover{background:#454545}
  #input{flex:1;background:none;border:none;outline:none;color:var(--text);font-size:16px;line-height:1.5;
         resize:none;max-height:200px;padding:8px 4px;font-family:inherit}
  #input::placeholder{color:var(--text-3)}
  #send{width:36px;height:36px;border-radius:50%;background:var(--accent);color:#000;display:flex;
        align-items:center;justify-content:center;flex-shrink:0;transition:opacity .15s,background .15s}
  #send:disabled{background:#676767;color:#2f2f2f;cursor:not-allowed}
  #send.stop{background:var(--accent)}
  .disclaimer{text-align:center;font-size:12px;color:var(--text-3);padding:10px 0 2px}

  .suggestions{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;max-width:600px}
  .sugg{padding:11px 16px;border:1px solid var(--border);border-radius:14px;font-size:14px;color:var(--text-2);
        transition:all .15s;text-align:left}
  .sugg:hover{background:var(--hover);color:var(--text);border-color:transparent}

  /* ── Modal ─────────────────────────────────────────── */
  .overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);display:none;align-items:center;
           justify-content:center;z-index:100;backdrop-filter:blur(2px)}
  .overlay.open{display:flex}
  .modal{background:#2a2a2a;border:1px solid var(--border);border-radius:18px;padding:28px;max-width:420px;
         width:90%;box-shadow:0 20px 60px rgba(0,0,0,.5)}
  .modal h2{font-size:20px;font-weight:600;margin-bottom:8px}
  .modal p{color:var(--text-2);font-size:14px;margin-bottom:18px;line-height:1.55}
  .modal input{width:100%;padding:12px 14px;background:#1a1a1a;border:1px solid var(--border);border-radius:10px;
               color:var(--text);font-size:14px;outline:none;margin-bottom:14px;font-family:var(--mono)}
  .modal input:focus{border-color:#7eb6ff}
  .modal .row{display:flex;gap:10px;justify-content:flex-end}
  .btn{padding:10px 18px;border-radius:10px;font-size:14px;font-weight:500;transition:opacity .15s}
  .btn-primary{background:var(--accent);color:#000}
  .btn-primary:hover{opacity:.9}
  .btn-ghost{background:#3a3a3a;color:var(--text)}
  .btn-ghost:hover{background:#454545}
  .modal .balance{font-size:13px;color:var(--text-3);margin-top:12px;text-align:center}

  #toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#e02e2e;color:#fff;
         padding:11px 20px;border-radius:10px;font-size:14px;display:none;z-index:200;max-width:80%;
         box-shadow:0 8px 24px rgba(0,0,0,.4)}

  @media (max-width:768px){
    #sidebar{position:fixed;z-index:60;height:100dvh;box-shadow:2px 0 20px rgba(0,0,0,.4)}
    #sidebar.collapsed{margin-left:calc(var(--sb-w) * -1)}
    .menu-toggle{display:flex}
    .msg.user .bubble{max-width:88%}
  }
</style>
</head>

<div id="app">
  <!-- Sidebar -->
  <aside id="sidebar">
    <div class="sb-top">
      <button class="icon-btn" onclick="toggleSidebar()" title="Toggle sidebar" aria-label="Toggle sidebar">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="9" y1="3" x2="9" y2="21"/></svg>
      </button>
      <button class="icon-btn" onclick="newChat()" title="New chat" aria-label="New chat">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20h9"/><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg>
      </button>
    </div>
    <nav class="sb-nav">
      <button class="nav-item" onclick="newChat()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20h9"/><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg>
        New chat
      </button>
      <button class="nav-item" onclick="focusSearch()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
        Search chats
      </button>
    </nav>
    <div class="sb-section">Chats</div>
    <div id="chat-list"></div>
    <div class="sb-foot">
      <button class="account" onclick="openKeyModal()">
        <span class="avatar-sm" id="acct-avatar">P</span>
        <span class="meta">
          <span class="name" id="acct-name">PWM account</span>
          <span class="sub" id="acct-sub">Set PWM key</span>
        </span>
      </button>
    </div>
  </aside>

  <!-- Main -->
  <main id="main">
    <header id="topbar">
      <button class="icon-btn menu-toggle" onclick="toggleSidebar()" aria-label="Menu">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>
      <button id="model-btn" onclick="toggleModelMenu(event)">
        ChatGPT <span class="sub" id="model-sub">5.5</span>
        <svg class="chev" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m6 9 6 6 6-6"/></svg>
      </button>
      <div class="topbar-spacer"></div>
      <button class="top-avatar" id="top-avatar" onclick="openKeyModal()">P</button>
    </header>

    <div id="model-menu"></div>

    <div id="scroll">
      <div id="thread">
        <div id="welcome">
          <h1>What can I help with?</h1>
          <div class="suggestions">
            <button class="sugg" onclick="useSugg(this)">Explain a concept in simple terms</button>
            <button class="sugg" onclick="useSugg(this)">Write and debug some code</button>
            <button class="sugg" onclick="useSugg(this)">Draft an email or document</button>
            <button class="sugg" onclick="useSugg(this)">Brainstorm ideas with me</button>
          </div>
        </div>
      </div>
    </div>

    <div id="composer-wrap">
      <div id="composer-inner">
        <form id="composer" onsubmit="onSend(event)">
          <button type="button" class="round" title="Attach" onclick="showToast('Attachments are not available in this build.')">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          </button>
          <textarea id="input" rows="1" placeholder="Ask anything"
                    onkeydown="onKey(event)" oninput="autosize(this)"></textarea>
          <button type="submit" id="send" disabled aria-label="Send">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/></svg>
          </button>
        </form>
        <div class="disclaimer">ChatGPT can make mistakes. Check important info.</div>
      </div>
    </div>
  </main>
</div>

<!-- PWM key modal -->
<div class="overlay" id="key-overlay">
  <div class="modal">
    <h2>Connect your PWM account</h2>
    <p>Enter your PWM key to use ChatGPT. Usage is billed to your PWM balance. Your key is stored only in this browser.</p>
    <input id="key-input" type="password" placeholder="pwm_…" autocomplete="off" spellcheck="false">
    <div class="row">
      <button class="btn btn-ghost" onclick="closeKeyModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveKey()">Save</button>
    </div>
    <div class="balance" id="balance-line"></div>
  </div>
</div>

<div id="toast"></div>

<script>
// ── Markdown setup ──────────────────────────────────────────────────────
marked.setOptions({gfm:true, breaks:false});

function renderMarkdown(text){
  const raw = marked.parse(text || '');
  return DOMPurify.sanitize(raw);
}

function enhance(container){
  // wrap code blocks with header + copy
  container.querySelectorAll('pre > code').forEach(code=>{
    if(code.dataset.enhanced) return;
    code.dataset.enhanced='1';
    const pre = code.parentElement;
    let lang = [...code.classList].find(c=>c.startsWith('language-'));
    lang = lang ? lang.replace('language-','') : 'text';
    try{ hljs.highlightElement(code); }catch(e){}
    const wrap = document.createElement('div'); wrap.className='code-wrap';
    const head = document.createElement('div'); head.className='code-head';
    head.innerHTML = `<span>${lang}</span><button class="code-copy">`+
      `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>Copy</button>`;
    pre.parentNode.insertBefore(wrap, pre);
    wrap.appendChild(head); wrap.appendChild(pre);
    head.querySelector('.code-copy').onclick=()=>{
      navigator.clipboard.writeText(code.innerText);
      const b=head.querySelector('.code-copy');
      b.innerHTML='<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>Copied';
      setTimeout(()=>b.innerHTML='<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>Copy',1500);
    };
  });
  // math
  if(window.renderMathInElement){
    try{ renderMathInElement(container,{delimiters:[
      {left:'$$',right:'$$',display:true},{left:'\\[',right:'\\]',display:true},
      {left:'\\(',right:'\\)',display:false},{left:'$',right:'$',display:false}
    ],throwOnError:false}); }catch(e){}
  }
}

// ── State ───────────────────────────────────────────────────────────────
const MODELS=[
  {id:'gpt-5.5', name:'ChatGPT 5.5', sub:'5.5', desc:'Great for most tasks'},
  {id:'gpt-5.4', name:'ChatGPT 5.4', sub:'5.4', desc:'Fast and capable'},
  {id:'gpt-5.4-mini', name:'ChatGPT 5.4 mini', sub:'5.4-mini', desc:'Fastest, most concise'},
];
let currentModel = localStorage.getItem('cg_model') || 'gpt-5.5';
let convos = JSON.parse(localStorage.getItem('cg_convos')||'[]');
let activeId = null;
let generating = false;
let abortCtl = null;

const $ = s=>document.querySelector(s);
const thread = $('#thread');
const scroll = $('#scroll');
const input = $('#input');
const sendBtn = $('#send');

function getKey(){ return localStorage.getItem('cg_pwm_key')||''; }

// ── Sidebar / nav ───────────────────────────────────────────────────────
function toggleSidebar(){ $('#sidebar').classList.toggle('collapsed'); }
function focusSearch(){ showToast('Use your browser find (Ctrl/Cmd+F) to search this chat.'); }

// ── Model menu ──────────────────────────────────────────────────────────
function renderModelMenu(){
  const m=$('#model-menu');
  m.innerHTML=MODELS.map(x=>`
    <button class="model-opt ${x.id===currentModel?'sel':''}" onclick="pickModel('${x.id}')">
      <svg width="20" height="20"><use href="#oai"/></svg>
      <span class="info"><span class="t">${x.name}</span><span class="d">${x.desc}</span></span>
      <svg class="check" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
    </button>`).join('');
}
function toggleModelMenu(e){ e.stopPropagation(); renderModelMenu(); $('#model-menu').classList.toggle('open'); }
function pickModel(id){
  currentModel=id; localStorage.setItem('cg_model',id);
  $('#model-sub').textContent=(MODELS.find(m=>m.id===id)||{}).sub||id;
  $('#model-menu').classList.remove('open');
}
document.addEventListener('click',()=>$('#model-menu').classList.remove('open'));

// ── Conversations ───────────────────────────────────────────────────────
function activeMsgs(){ const c=convos.find(c=>c.id===activeId); return c?c.messages:[]; }
function persist(){ localStorage.setItem('cg_convos', JSON.stringify(convos.slice(0,80))); }

function saveConvo(messages, title){
  if(!activeId){
    activeId = Date.now().toString();
    convos.unshift({id:activeId, title, messages, ts:Date.now()});
  } else {
    const c=convos.find(c=>c.id===activeId);
    if(c){ c.messages=messages; c.ts=Date.now(); if(!c.title) c.title=title; }
  }
  persist(); renderChatList();
}

function dateGroup(ts){
  const d=new Date(ts), now=new Date();
  const day=864e5, today=new Date(now.getFullYear(),now.getMonth(),now.getDate()).getTime();
  if(ts>=today) return 'Today';
  if(ts>=today-day) return 'Yesterday';
  if(ts>=today-7*day) return 'Previous 7 Days';
  if(ts>=today-30*day) return 'Previous 30 Days';
  return 'Older';
}

function renderChatList(){
  const list=$('#chat-list'); list.innerHTML='';
  let lastGroup=null;
  convos.slice().sort((a,b)=>b.ts-a.ts).forEach(c=>{
    const g=dateGroup(c.ts||0);
    if(g!==lastGroup){ lastGroup=g; const h=document.createElement('div'); h.className='sb-section'; h.textContent=g; list.appendChild(h); }
    const el=document.createElement('div');
    el.className='chat-item'+(c.id===activeId?' active':'');
    el.innerHTML=`<span class="title">${escapeHtml(c.title||'New chat')}</span>`+
      `<button class="del" title="Delete" onclick="event.stopPropagation();delConvo('${c.id}')">`+
      `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg></button>`;
    el.onclick=()=>loadConvo(c.id);
    list.appendChild(el);
  });
}

function delConvo(id){
  convos=convos.filter(c=>c.id!==id); persist();
  if(activeId===id) newChat(); else renderChatList();
}

function loadConvo(id){
  activeId=id; const c=convos.find(c=>c.id===id); if(!c) return;
  thread.innerHTML='';
  c.messages.forEach((m,i)=>addMessage(m.role,m.content,false));
  markLast(); renderChatList(); scrollBottom(true);
  if(window.innerWidth<=768) $('#sidebar').classList.add('collapsed');
}

function newChat(){
  activeId=null;
  thread.innerHTML=`<div id="welcome"><h1>What can I help with?</h1>
    <div class="suggestions">
      <button class="sugg" onclick="useSugg(this)">Explain a concept in simple terms</button>
      <button class="sugg" onclick="useSugg(this)">Write and debug some code</button>
      <button class="sugg" onclick="useSugg(this)">Draft an email or document</button>
      <button class="sugg" onclick="useSugg(this)">Brainstorm ideas with me</button>
    </div></div>`;
  renderChatList();
  if(window.innerWidth<=768) $('#sidebar').classList.add('collapsed');
}

// ── Messages ────────────────────────────────────────────────────────────
function escapeHtml(s){ const d=document.createElement('div'); d.textContent=s; return d.innerHTML; }

function clearWelcome(){ const w=$('#welcome'); if(w) w.remove(); }

function addMessage(role, content, animate=true){
  clearWelcome();
  const msg=document.createElement('div'); msg.className='msg '+role;
  if(role==='user'){
    msg.innerHTML=`<div class="bubble"></div>`;
    msg.querySelector('.bubble').textContent=content;
  } else {
    msg.innerHTML=`<div class="logo"><svg viewBox="0 0 24 24"><use href="#oai"/></svg></div>
      <div class="col"><div class="markdown"></div>
        <div class="actions">
          <button class="act act-copy" title="Copy"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg></button>
          <button class="act act-regen" title="Regenerate"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12a9 9 0 0 1 15-6.7L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-15 6.7L3 16"/><path d="M3 21v-5h5"/></svg></button>
        </div>
      </div>`;
    const md=msg.querySelector('.markdown');
    if(content){ md.innerHTML=renderMarkdown(content); enhance(md); }
    msg.querySelector('.act-copy').onclick=()=>{
      navigator.clipboard.writeText(content);
      const b=msg.querySelector('.act-copy'); b.classList.add('ok');
      setTimeout(()=>b.classList.remove('ok'),1200);
    };
    msg.querySelector('.act-regen').onclick=()=>regenerate();
  }
  thread.appendChild(msg);
  return msg;
}

function markLast(){
  thread.querySelectorAll('.msg.assistant').forEach(m=>m.classList.remove('last'));
  const all=thread.querySelectorAll('.msg.assistant');
  if(all.length) all[all.length-1].classList.add('last');
}

function scrollBottom(force){
  const near = scroll.scrollHeight - scroll.scrollTop - scroll.clientHeight < 120;
  if(force||near) scroll.scrollTop=scroll.scrollHeight;
}

// ── Compose / send ──────────────────────────────────────────────────────
function autosize(el){ el.style.height='auto'; el.style.height=Math.min(el.scrollHeight,200)+'px';
  sendBtn.disabled = generating ? false : !el.value.trim(); }
function onKey(e){ if(e.key==='Enter'&&!e.shiftKey){ e.preventDefault(); onSend(e); } }
function useSugg(el){ input.value=el.textContent; autosize(input); input.focus(); }

function setGenerating(on){
  generating=on;
  if(on){
    sendBtn.classList.add('stop'); sendBtn.disabled=false;
    sendBtn.innerHTML='<svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="6" width="12" height="12" rx="2.5"/></svg>';
  } else {
    sendBtn.classList.remove('stop');
    sendBtn.innerHTML='<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/></svg>';
    sendBtn.disabled=!input.value.trim();
  }
}

async function onSend(e){
  if(e) e.preventDefault();
  if(generating){ if(abortCtl) abortCtl.abort(); return; }
  const text=input.value.trim();
  if(!text) return;
  if(!getKey()){ openKeyModal(); return; }
  input.value=''; autosize(input);
  addMessage('user', text);
  scrollBottom(true);
  await streamReply([...activeMsgs(), {role:'user',content:text}], text);
}

async function regenerate(){
  if(generating) return;
  const msgs=activeMsgs();
  // drop trailing assistant turn
  let i=msgs.length-1;
  while(i>=0 && msgs[i].role==='assistant'){ i--; }
  const upto=msgs.slice(0,i+1);
  if(!upto.length) return;
  // remove last assistant bubble from DOM
  const assistants=thread.querySelectorAll('.msg.assistant');
  if(assistants.length) assistants[assistants.length-1].remove();
  const lastUser=[...upto].reverse().find(m=>m.role==='user');
  await streamReply(upto, lastUser?lastUser.content:'');
}

async function streamReply(sendMsgs, title){
  const msg=addMessage('assistant','');
  const md=msg.querySelector('.markdown');
  md.classList.add('cursor');
  markLast(); scrollBottom(true);
  setGenerating(true);
  abortCtl=new AbortController();
  let full=''; let raf=null;
  const paint=()=>{ md.innerHTML=renderMarkdown(full); scrollBottom(); raf=null; };

  try{
    const resp=await fetch('/api/chat',{
      method:'POST',
      headers:{'Content-Type':'application/json','X-PWM-Key':getKey()},
      body:JSON.stringify({messages:sendMsgs, model:currentModel, stream:true}),
      signal:abortCtl.signal
    });
    if(!resp.ok){
      const err=await resp.json().catch(()=>({detail:resp.statusText}));
      throw new Error(err.detail||('HTTP '+resp.status));
    }
    const reader=resp.body.getReader(); const dec=new TextDecoder();
    let buf='';
    while(true){
      const {done,value}=await reader.read(); if(done) break;
      buf+=dec.decode(value,{stream:true});
      const lines=buf.split('\n'); buf=lines.pop();
      for(const line of lines){
        if(!line.startsWith('data:')) continue;
        const d=line.slice(5).trim();
        if(!d||d==='[DONE]') continue;
        try{
          const o=JSON.parse(d);
          const delta=(o.choices&&o.choices[0]&&o.choices[0].delta&&o.choices[0].delta.content)||'';
          if(delta){ full+=delta; if(!raf) raf=requestAnimationFrame(paint); }
          if(o.error){ throw new Error(o.error.message||'stream error'); }
        }catch(_){}
      }
    }
  }catch(err){
    if(err.name!=='AbortError'){ showToast(err.message); }
  }finally{
    if(raf) cancelAnimationFrame(raf);
    md.classList.remove('cursor');
    md.innerHTML=renderMarkdown(full); enhance(md);
    // rebind copy to final text
    const copyBtn=msg.querySelector('.act-copy');
    if(copyBtn) copyBtn.onclick=()=>{navigator.clipboard.writeText(full);copyBtn.classList.add('ok');setTimeout(()=>copyBtn.classList.remove('ok'),1200);};
    setGenerating(false);
    abortCtl=null;
    if(full.trim()){
      const msgs=[...sendMsgs, {role:'assistant',content:full}];
      saveConvo(msgs, (title||'New chat').slice(0,60));
    }
    scrollBottom();
  }
}

// ── PWM key modal ───────────────────────────────────────────────────────
function openKeyModal(){ $('#key-input').value=getKey(); $('#key-overlay').classList.add('open'); refreshBalance(); $('#key-input').focus(); }
function closeKeyModal(){ $('#key-overlay').classList.remove('open'); }
async function saveKey(){
  const k=$('#key-input').value.trim();
  if(!k){ showToast('Enter your PWM key.'); return; }
  localStorage.setItem('cg_pwm_key',k);
  updateAccount(); closeKeyModal();
}
$('#key-input').addEventListener('keydown',e=>{ if(e.key==='Enter') saveKey(); });

async function refreshBalance(){
  const k=getKey(); const line=$('#balance-line');
  if(!k){ line.textContent=''; return; }
  line.textContent='Checking balance…';
  try{
    const r=await fetch('/api/balance',{headers:{'X-PWM-Key':k}});
    const d=await r.json();
    if(d.valid && d.balance!=null) line.textContent=`Balance: ${Number(d.balance).toFixed(2)} PWM`;
    else line.textContent=d.reason||'Could not verify balance.';
  }catch(e){ line.textContent=''; }
}

function updateAccount(){
  const k=getKey();
  const tag=k?(k.slice(0,8)+'…'):'Set PWM key';
  $('#acct-sub').textContent=k?tag:'Set PWM key';
}

// ── Toast ───────────────────────────────────────────────────────────────
let toastT=null;
function showToast(msg){
  const t=$('#toast'); t.textContent=msg; t.style.display='block';
  clearTimeout(toastT); toastT=setTimeout(()=>t.style.display='none',4500);
}

// ── Init ────────────────────────────────────────────────────────────────
(function init(){
  pickModel(currentModel);
  renderChatList(); updateAccount();
  if(!getKey()) openKeyModal();
  input.focus();
})();
</script>
